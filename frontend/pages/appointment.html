<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - MedicPulse</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .time-slots {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .time-slot {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .time-slot:hover {
            border-color: var(--primary-color);
            background-color: var(--primary-light);
            color: var(--primary-color);
        }
        .time-slot.selected {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>MedicPulse</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="patient_dashboard.html"><i class="fas fa-home"></i> <span>Dashboard</span></a></li>
                <li><a href="appointment.html" class="active"><i class="fas fa-calendar-plus"></i> <span>Book Appointment</span></a></li>
                <li><a href="#"><i class="fas fa-calendar-check"></i> <span>My Appointments</span></a></li>
                <li><a href="visit_history.html"><i class="fas fa-history"></i> <span>Visit History</span></a></li>
                <li><a href="#"><i class="fas fa-user"></i> <span>Profile</span></a></li>
            </ul>
        </div>

        <div class="main-wrapper">
            <nav class="navbar">
                <div class="nav-left">
                    <span class="system-name">Appointment Booking</span>
                </div>
                <div class="nav-right">
                    <div class="user-profile">
                        <span class="user-name">John Doe</span>
                    </div>
                    <a href="login.html" class="logout-btn">Logout</a>
                </div>
            </nav>

            <main class="content-area">
                <div class="page-header">
                    <h1>Book a New Appointment</h1>
                    <p>Find a doctor and schedule your visit in seconds.</p>
                </div>

                <div class="card booking-form">
                    <form>
                        <div class="input-group">
                            <label for="dept">Select Department</label>
                            <select id="dept">
                                <option>Cardiology</option>
                                <option>Neurology</option>
                                <option>Orthopedics</option>
                                <option>Pediatrics</option>
                                <option>General Medicine</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="doctor">Select Doctor</label>
                            <select id="doctor">
                                <option>Dr. Rao (Cardiologist)</option>
                                <option>Dr. Smith (General Physician)</option>
                                <option>Dr. Williams (Neurologist)</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="date">Preferred Date</label>
                            <input type="date" id="date" required>
                        </div>
                        <div class="input-group">
                            <label>Available Time Slots</label>
                            <div class="time-slots">
                                <div class="time-slot">10:00 AM</div>
                                <div class="time-slot">10:15 AM</div>
                                <div class="time-slot selected">10:30 AM</div>
                                <div class="time-slot">10:45 AM</div>
                                <div class="time-slot">11:00 AM</div>
                                <div class="time-slot">11:15 AM</div>
                                <div class="time-slot">11:30 AM</div>
                                <div class="time-slot">11:45 AM</div>
                            </div>
                        </div>
                        <button type="submit" class="login-btn">Confirm Appointment</button>
                    </form>
                </div>
            </main>
        </div>
    </div>
    <script src="../js/script.js"></script>
</body>
</html>
